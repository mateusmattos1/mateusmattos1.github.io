<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Mateus de Mattos Ferreira</title>
  <!-- GitHub Pages SPA redirect (https://github.com/rafgraph/spa-github-pages) -->
  <script>
    // pathSegmentsToKeep = 0 because this is a user/organization page (mateusmattos1.github.io),
    // served from the domain root, not from a /repo-name/ subpath.
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
